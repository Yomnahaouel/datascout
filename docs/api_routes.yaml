# DataScout API Routes
# Base URL: /api/v1

# Health
GET    /health                         # Backend health check
GET    /docs                           # FastAPI Swagger documentation

# Platform Stats
GET    /api/v1/stats                   # Total datasets, total rows, average quality, domain count

# Dataset Management
POST   /api/v1/datasets/upload         # Upload a new CSV/TSV/JSON/Parquet/Excel dataset
GET    /api/v1/datasets                # List datasets with pagination, filters, sorting, tags/domains
GET    /api/v1/datasets/{id}           # Get dataset details, profiles, tags, quality, dashboard config
DELETE /api/v1/datasets/{id}           # Delete dataset and related analysis records
GET    /api/v1/datasets/{id}/preview   # Preview raw rows from uploaded file
POST   /api/v1/datasets/{id}/reprocess # Clear analysis records and rerun ingestion pipeline

# Dataset Search
GET    /api/v1/datasets/search?q={query}&limit={n}
                                        # Semantic search across indexed datasets

# Auto-Profile
GET    /api/v1/datasets/{id}/profile   # Column-level statistical profile

# Auto-Tags
GET    /api/v1/datasets/{id}/tags      # Domain, data-type, PII and other tags

# Quality Score
GET    /api/v1/datasets/{id}/quality   # Quality breakdown and recommendations

# Auto-Dashboard
GET    /api/v1/datasets/{id}/dashboard # Generated dashboard charts/KPIs when enabled

# Data Sources
GET    /api/v1/data-sources/           # List external/data-source records
POST   /api/v1/data-sources/           # Create a data-source record
GET    /api/v1/data-sources/{id}       # Get a data-source record

# Jobs
GET    /api/v1/jobs/                   # List ingestion/processing jobs
POST   /api/v1/jobs/                   # Create a processing job for a data source
GET    /api/v1/jobs/{id}               # Get a processing job

# Results
GET    /api/v1/results/                # List processing results, optionally ?job_id={id}
POST   /api/v1/results/                # Create a processing result
GET    /api/v1/results/{id}            # Get a processing result

# Academic / Evaluation Scripts
# These are command-line scripts, not HTTP routes:

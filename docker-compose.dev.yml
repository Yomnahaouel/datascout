# Fast development override for DataScout.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This avoids rebuilding images for normal Python/React source changes by
# mounting local source files into the containers.

services:
  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - pip_cache:/root/.cache/pip
      - model_cache:/cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci --prefer-offline && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - npm_cache:/root/.npm
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  frontend_node_modules:
    driver: local
